services:
  postgres:
    image: postgres:16.4
    container_name: seo-audit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: seo
      POSTGRES_PASSWORD: seo
      POSTGRES_DB: seo_audit
    ports:
      - '5432:5432'
    volumes:
      - seo-audit-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U seo -d seo_audit']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  seo-audit-pgdata:
    name: seo-audit-pgdata
